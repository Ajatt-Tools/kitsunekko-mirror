name: Scheduled Kitsunekko sync and Site deploy

on:
  schedule:
    - cron: "0 */3 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  pages: write
  id-token: write
  # Give the default GITHUB_TOKEN write permission to commit and push the
  # added or changed files to the repository.
  # Needed to save new subtitle files after sync.
  contents: write

jobs:
  synchronize-repo:
    name: Synchronize with Kitsunekko
    runs-on: ubuntu-latest

    steps:
      # https://github.com/endersonmenezes/free-disk-space
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: false
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
          testing: false

      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Disk Info
        shell: bash
        run: |
          echo "Subtitles folder size:"
          du -sh subtitles
          echo "Disk usage:"
          df -h .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install kitsunekko-tools
        run: pip install -r requirements.txt

      - name: Synchronize with kitsunekko
        shell: bash
        env:
          KITSU_API_URL: ${{ secrets.KITSUAPIURL }}
          KITSU_API_KEY: ${{ secrets.KITSUAPIKEY }}
        run: >-
          ktools -c ktools.toml sync --api

      - name: Install fdupes
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: fdupes
          version: 1.0

      - name: Remove duplicates
        shell: bash
        run: bash scripts/remove-duplicates.sh

      - name: Remove large files
        shell: bash
        run: find subtitles -type f -regextype posix-extended -iregex '.*\.(ass|ssa|srt)$' -size +10M -print -delete

      - name: Sync ignore files
        shell: bash
        run: >-
          ktools -c ktools.toml ignore add_all

      - name: Sanitize
        shell: bash
        run: >-
          ktools -c ktools.toml sanitize

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Synchronize Repository with Kitsunekko
          commit_user_name: GitHub Actions
          commit_user_email: noreply@github.com
          commit_author: GitHub <noreply@github.com>

      - name: Build website
        shell: bash
        run: |
          rm -rf -- _site
          ktools -c ktools.toml copy_site_resources
          ktools -c ktools.toml build

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload the site folder
          path: '_site'

  # Deployment job
  # Reference: https://github.com/actions/starter-workflows/blob/main/pages/mdbook.yml
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: synchronize-repo
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
